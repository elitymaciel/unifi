services:
  app:
    image: ghcr.io/elitymaciel/laravel-php:${IMAGE_TAG:-latest}
    container_name: laravel_app
    restart: unless-stopped
    env_file: .env
    volumes:
      - laravel_storage:/var/www/storage
      - laravel_database:/var/www/database
    networks:
      - laravel_network 
    depends_on:
      - redis
      - db

  nginx:
    image: ghcr.io/elitymaciel/laravel-nginx:${IMAGE_TAG:-latest}
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - laravel_storage:/var/www/storage:ro
    networks:
      - laravel_network
    depends_on:
      - app

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - laravel_network
    volumes:
      - redis_data:/data

  db:
    image: postgres:16-alpine
    container_name: laravel_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel_unifi}
      POSTGRES_USER: ${DB_USERNAME:-laravel_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?database password is required}
    volumes:
      - postgres_laravel_data:/var/lib/postgresql/data
    networks:
      - laravel_network 

networks:
  laravel_network: 

volumes:
  laravel_storage:
  laravel_database:
  redis_data:
  postgres_laravel_data:
