services:
  app:
    image: ghcr.io/elitymaciel/laravel-php:latest
    container_name: laravel_app
    restart: unless-stopped
    env_file: .env
    volumes:
      - laravel_storage:/var/www/storage
    networks:
      - laravel_network
    depends_on:
      - redis

  nginx:
    image: ghcr.io/elitymaciel/laravel-nginx:latest
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - laravel_storage:/var/www/storage:ro
    networks:
      - laravel_network
    depends_on:
      - app

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - laravel_network
    volumes:
      - redis_data:/data

networks:
  laravel_network:

volumes:
  laravel_storage:
  redis_data:
