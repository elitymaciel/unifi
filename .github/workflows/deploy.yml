name: Build and Deploy Docker

permissions:          # ← ADICIONE ESSA SEÇÃO NO TOPO DO ARQUIVO
  contents: read      # Permite checkout/fetch do repo
  packages: write     # Já tem pro GHCR push, mas mantenha

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PHP: ${{ github.actor }}/laravel-php
  IMAGE_NAME_NGINX: ${{ github.actor }}/laravel-nginx

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.PERSONAL_GITHUB_TOKEN }}

      - name: Build & Push PHP
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/php/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PHP }}:latest
          no-cache: true
          pull: true

      - name: Build & Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nginx/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_NGINX }}:latest
          no-cache: true
          pull: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: appleboy/scp-action@v0.1.7
        with:
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "docker-compose.production.yml"
          target: "~/laravel/"
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
      - uses: appleboy/ssh-action@v0.1.7
        with:
          key: ${{ secrets.SSH_KEY }}
          port: 22
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          script: |
            echo "${{ secrets.ENV_FILE }}" > .env
            mv .env ~/laravel/.env
            cd ~/laravel && chmod +x deploy.sh && ./deploy.sh
      - name: Deploy
        run: |
          git config --global url."https://${{ secrets.PERSONAL_GITHUB_TOKEN }}:@github.com".insteadOf "https://github.com"
          echo "${{ secrets.ENV_FILE }}" > .env
          scp -P 22 docker-compose.production.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/laravel/
          scp -P 22 .env ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/laravel/
          ssh -p 22 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd ~/laravel && chmod +x deploy.sh && ./deploy.sh"
