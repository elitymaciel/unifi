name: Build and Deploy (newsnoticias style)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐘 Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pdo, mysql, pdo_mysql, bcmath, intl, fileinfo, gd
          tools: composer:v2
          coverage: none

      - name: 📦 Install Composer Dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader --no-scripts

      - name: 🔓 Fix permissions before Rsync
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            mkdir -p ~/laravel
            sudo chown -R $USER:$USER ~/laravel || true
            sudo chmod -R 775 ~/laravel || true
            rm -rf ~/laravel/public/build || true

      - name: 🚀 Deploy to Server via Rsync
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
          ARGS: "-avz --delete --exclude='.git/' --exclude='.env' --exclude='/node_modules/' --exclude='/storage/' --exclude='/public/storage/'"
          SOURCE: "./"
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          TARGET: "~/laravel"

      - name: 🛠️ Run Laravel Deployment Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd ~/laravel
            
            git clean -fd
            git reset --hard
            git pull origin main

            # Criar o .env de produção
            echo '${{ secrets.ENV_FILE }}' > ~/laravel/.env

            # Limpar Docker para evitar falta de espaço
            docker system prune -a -f
            docker builder prune -f
            docker image prune -a -f

            # Garantir que as pastas críticas existam no host (mesmo com volumes, ajuda no build)
            mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache storage/logs bootstrap/cache
            
            # Parar containers antigos e rebuildar
            docker compose -f docker-compose.production.yml down --remove-orphans || true
            docker compose -f docker-compose.production.yml up -d --build

            # Aguardar inicialização
            echo "Aguardando containers..."
            sleep 15

            # Otimizações e permissões dentro do container (importante para volumes nomeados)
            docker compose -f docker-compose.production.yml exec -T app sh -c "chown -R appuser:appuser /var/www/storage /var/www/bootstrap/cache && chmod -R 775 /var/www/storage /var/www/bootstrap/cache"
            docker compose -f docker-compose.production.yml exec -T app php artisan migrate --force || true
            docker compose -f docker-compose.production.yml exec -T app php artisan optimize || true
            docker compose -f docker-compose.production.yml exec -T app php artisan config:cache || true
            docker compose -f docker-compose.production.yml exec -T app php artisan route:cache || true
            docker compose -f docker-compose.production.yml exec -T app php artisan view:cache || true
            docker compose -f docker-compose.production.yml exec -T app php artisan storage:link || true

