name: Build and Deploy Docker

permissions:          # ← ADICIONE ESSA SEÇÃO NO TOPO DO ARQUIVO
  contents: read      # Permite checkout/fetch do repo
  packages: write     # Já tem pro GHCR push, mas mantenha

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PHP: ${{ github.actor }}/laravel-php
  IMAGE_NAME_NGINX: ${{ github.actor }}/laravel-nginx

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.PERSONAL_GITHUB_TOKEN }}

      - name: Build & Push PHP
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/php/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PHP }}:latest
          no-cache: true
          pull: true

      - name: Build & Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nginx/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_NGINX }}:latest
          no-cache: true
          pull: true

  deploy:
  needs: build  # assumindo que você tem um job build antes
  runs-on: ubuntu-latest
  steps:
    - uses: actions/checkout@v4

    # Copia apenas os arquivos necessários pro servidor
    - name: Copiar arquivos de deploy via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        port: 22
        source: |
          docker-compose.production.yml
          deploy.sh   # se o deploy.sh não estiver já no servidor ou se você atualiza ele
        target: "~/laravel/"
        strip_components: 0  # opcional, mantém a estrutura

    # Executa o deploy via SSH
    - name: Deploy na Laravel
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        port: 22
        script: |
          # Cria ou atualiza o .env (melhor forma: echo multi-linha)
          echo '${{ secrets.ENV_FILE }}' > ~/laravel/.env

          cd ~/laravel

          # Opcional: git pull se o código Laravel estiver no servidor via git
          # git pull origin main || echo "Sem git pull necessário"

          # Torna executável e roda o script
          chmod +x deploy.sh
          ./deploy.sh
