name: Build and Deploy Docker

permissions:          # ← ADICIONE ESSA SEÇÃO NO TOPO DO ARQUIVO
  contents: read      # Permite checkout/fetch do repo
  packages: write     # Já tem pro GHCR push, mas mantenha
 
on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PHP: ${{ github.actor }}/laravel-php
  IMAGE_NAME_NGINX: ${{ github.actor }}/laravel-nginx

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push PHP
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/php/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PHP }}:latest
          no-cache: true
          pull: true

      - name: Build & Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nginx/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_NGINX }}:latest
          no-cache: true
          pull: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: 22
      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
          ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "echo 'Test OK'"
          echo "${{ secrets.ENV_FILE }}" > .env
          scp -P 22 docker-compose.production.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/laravel/
          scp -P 22 .env ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/laravel/
          ssh -p 22 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "cd ~/laravel && chmod +x deploy.sh && ./deploy.sh"