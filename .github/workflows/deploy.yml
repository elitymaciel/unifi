name: Build and Deploy Docker

permissions:          # ← ADICIONE ESSA SEÇÃO NO TOPO DO ARQUIVO
  contents: read      # Permite checkout/fetch do repo
  packages: write     # Já tem pro GHCR push, mas mantenha

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PHP: ${{ github.actor }}/laravel-php
  IMAGE_NAME_NGINX: ${{ github.actor }}/laravel-nginx

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.PERSONAL_GITHUB_TOKEN }}

      - name: Build & Push PHP
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/php/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PHP }}:${{ github.sha }}, ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PHP }}:latest
          no-cache: true
          pull: true

      - name: Build & Push Nginx
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/nginx/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_NGINX }}:${{ github.sha }}, ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_NGINX }}:latest
          no-cache: true
          pull: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
      - uses: appleboy/scp-action@v0.1.7
        with:
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "docker-compose.production.yml"
          target: "~/laravel/"
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
      - uses: appleboy/ssh-action@v0.1.7
        with:
          key: ${{ secrets.SSH_KEY }}
          port: 22
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          script: |
            cd ~/laravel
            git reset --hard
            git pull origin main
            rm -f docker-compose.yaml docker-compose.yml
            echo '${{ secrets.PERSONAL_GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            echo "IMAGE_TAG=${{ github.sha }}" >> ~/laravel/.env
            echo '${{ secrets.ENV_FILE }}' >> ~/laravel/.env
            chmod +x ~/laravel/deploy.sh && ~/laravel/deploy.sh
