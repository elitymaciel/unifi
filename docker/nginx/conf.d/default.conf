server {
    listen 80;
    server_name _;
    root /var/www/public;
    index index.php;

    resolver 127.0.0.11 valid=30s;   # DNS interno do Docker

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    upstream php {
        server app:9000;
    }

    location ~ \.php$ {
        fastcgi_pass php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
